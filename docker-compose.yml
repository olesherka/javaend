services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: semester_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d semester_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/semester_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: smoke.paladin@gmail.com
      SPRING_MAIL_PASSWORD: YOUR_APP_PASSWORD
      APP_MAIL_FROM: smoke.paladin@gmail.com
      APP_JWT_SECRET: VGhpc0lzQVN1cGVyU2VjdXJlQmFzZTY0S2V5Rm9ySldUU2lnbmluZzEyMzQ1Njc4OTA=
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

volumes:
  postgres_data:
